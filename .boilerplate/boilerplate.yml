# Terragrunt Boilerplate Configuration
variables:
  # Generic Boilerplate Variables Setup
  - name: is_hub
    order: 0
    description: "Is this a hub configuration?"
    type: bool
    default: false
    confirm: true
  - name: tags
    order: 1
    description: "Tags"
    type: map
    default: {}
    confirm: true
  # End - Generic Boilerplate Variables Setup
  - name: vpc_dependency_enabled
    order: 2
    description: "VPC Dependency Enabled"
    type: bool
    default: true
    confirm: true
  - name: vpc_dependency_path
    order: 3
    description: "VPC Dependency Path"
    type: string
    default: "../vpc"
    confirm: true
  - name: vpc_dependency_network_type
    order: 4
    description: "VPC Dependency Network Type, e.g. private, public, database, intra, both(intra+private), three(intra+private+database)"
    type: enum
    default: private
    options:
      - private
      - public
      - database
      - intra
      - both
      - three
    confirm: true
  - name: vpc_dependency_route_tables_from
    order: 5
    description: "VPC Dependency Route Table From, route_tables or subnet"
    type: enum
    default: route_tables
    options:
      - route_tables
      - subnet
    confirm: true

hooks:
  after:
    - command: "git"
      args: ["add", "."]
      dir: "{{ outputFolder }}"